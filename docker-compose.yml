# ============================================================================
# finde — self-hosted stack (single VPS)
#   postgres : app database (internal only)
#   app      : Express api-server (+ serves /api/uploads from a volume)
#   web      : Caddy — serves the SPA and reverse-proxies /api -> app
#   n8n      : automation (http://<server-ip>:5678)
# Secrets come from .env (NOT committed — scp'd to the server).
# ============================================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: Africa/Cairo
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
  n8ndata:
