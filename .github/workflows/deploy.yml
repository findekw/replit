name: Deploy to VPS

# Optional CI-based deploy. DISABLED by default (manual trigger only) because it
# needs SSH secrets. Primary auto-deploy runs ON the server via the
# finde-deploy.timer systemd unit (polls git every minute — no secrets needed).
#
# To enable push-triggered deploys: add repo secrets SSH_HOST, SSH_USER, SSH_KEY
# (private key matching the server's authorized_keys), then uncomment the `push:`
# trigger below.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/finde
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            # sync DB schema (idempotent)
            docker compose run --rm -T app pnpm --filter @workspace/db push-force
            docker image prune -f
